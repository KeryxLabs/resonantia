
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

.scene {
  width: 100%;
  min-height: 600px;
  background: #080810;
  border-radius: var(--border-radius-lg);
  position: relative;
  overflow: hidden;
  font-family: var(--font-sans);
}

.wave-orb {
  position: absolute;
  border-radius: 50%;
  opacity: 0.13;
  filter: blur(40px);
  pointer-events: none;
}

.star {
  position: absolute;
  border-radius: 50%;
  background: white;
  pointer-events: none;
}

/* collapsed icon */
.tel-icon {
  position: absolute;
  left: 28px;
  bottom: 28px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: rgba(14, 10, 30, 0.9);
  border: 0.5px solid rgba(160, 140, 255, 0.35);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 20;
  transition: border-color 0.2s, background 0.2s;
}
.tel-icon:hover { border-color: rgba(180,160,255,0.6); background: rgba(60,40,120,0.6); }
.tel-icon.hidden { opacity: 0; pointer-events: none; transition: opacity 0.15s; }

/* instrument layer */
.instrument {
  position: absolute;
  left: 20px;
  bottom: 20px;
  display: flex;
  flex-direction: row;
  align-items: flex-end;
  gap: 10px;
  z-index: 20;
  opacity: 0;
  pointer-events: none;
  transform: scale(0.85) translateY(20px);
  transform-origin: left bottom;
  transition: opacity 0.3s cubic-bezier(0.22,1,0.36,1), transform 0.35s cubic-bezier(0.22,1,0.36,1);
}
.instrument.open {
  opacity: 1;
  pointer-events: all;
  transform: scale(1) translateY(0);
}

/* telescope svg wrapper */
.scope-wrap { position: relative; }

/* timeline layer */
.timeline-layer {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 0;
  padding-bottom: 4px;
  height: 260px;
  position: relative;
}

.tl-line {
  position: absolute;
  left: 5px;
  top: 0;
  bottom: 0;
  width: 1px;
  background: linear-gradient(to bottom, rgba(150,130,255,0.0), rgba(150,130,255,0.25) 20%, rgba(150,130,255,0.25) 80%, rgba(150,130,255,0.0));
}

.tl-sessions {
  position: absolute;
  left: 0;
  right: 0;
  top: 0;
  bottom: 0;
  display: flex;
  flex-direction: column-reverse;
  justify-content: flex-start;
  gap: 0;
}

.tl-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 3px 0;
  cursor: pointer;
  transition: opacity 0.15s;
  flex-shrink: 0;
}
.tl-item:hover .tl-label { color: rgba(220,210,255,0.95); }
.tl-item:hover .tl-dot { transform: scale(1.4); }

.tl-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-left: 2px;
  transition: transform 0.15s;
}

.tl-label {
  font-size: 11px;
  color: rgba(180,165,255,0.7);
  white-space: nowrap;
  transition: color 0.15s;
  max-width: 130px;
  overflow: hidden;
  text-overflow: ellipsis;
}

.tl-date {
  font-size: 10px;
  color: rgba(120,110,180,0.4);
  margin-left: auto;
  padding-right: 2px;
  white-space: nowrap;
}

.range-badge {
  position: absolute;
  top: -22px;
  left: 0;
  font-size: 10px;
  color: rgba(140,125,210,0.45);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  white-space: nowrap;
}

.close-btn {
  position: absolute;
  top: -24px;
  right: 0;
  font-size: 10px;
  color: rgba(140,125,210,0.35);
  cursor: pointer;
  transition: color 0.15s;
  user-select: none;
}
.close-btn:hover { color: rgba(200,180,255,0.7); }
</style>

<div class="scene" id="scene">
  <div class="wave-orb" style="width:300px;height:300px;background:#5b3fa0;top:30px;left:100px;"></div>
  <div class="wave-orb" style="width:220px;height:220px;background:#3a5090;top:160px;left:280px;"></div>
  <div class="wave-orb" style="width:160px;height:160px;background:#7a3060;top:60px;left:340px;"></div>
  <div id="stars"></div>

  <!-- collapsed icon -->
  <div class="tel-icon" id="tel-icon">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(190,170,255,0.85)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="4"/>
      <line x1="19" y1="19" x2="14.65" y2="14.65"/>
      <line x1="11" y1="7" x2="11" y2="5"/>
      <line x1="11" y1="17" x2="11" y2="19"/>
      <line x1="7" y1="11" x2="5" y2="11"/>
      <line x1="15" y1="11" x2="17" y2="11"/>
    </svg>
  </div>

  <!-- expanded instrument -->
  <div class="instrument" id="instrument">

    <!-- telescope SVG -->
    <div class="scope-wrap">
      <svg width="52" height="270" viewBox="0 0 52 270" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- lens top -->
        <ellipse cx="26" cy="14" rx="15" ry="4" fill="#141025" stroke="rgba(160,140,255,0.4)" stroke-width="0.8"/>
        <ellipse cx="26" cy="14" rx="10" ry="2.5" fill="#0a0818" stroke="rgba(160,140,255,0.5)" stroke-width="0.5"/>
        <ellipse cx="24.5" cy="13.2" rx="3.5" ry="1" fill="rgba(200,185,255,0.12)"/>

        <!-- barrel upper -->
        <path d="M11 14 L15 118 L37 118 L41 14 Z" fill="#0f0d1e" stroke="rgba(120,100,190,0.2)" stroke-width="0.5"/>
        <path d="M11 14 L15 118" stroke="rgba(170,150,255,0.1)" stroke-width="1.2"/>
        <path d="M41 14 L37 118" stroke="rgba(60,45,110,0.2)" stroke-width="0.8"/>

        <!-- dial ring (draggable) -->
        <g id="dial-g" style="cursor:ns-resize;">
          <path d="M13 96 L15 118 L37 118 L39 96 Z" fill="#1c1840" stroke="rgba(155,135,255,0.4)" stroke-width="0.5"/>
          <line x1="13" y1="96" x2="39" y2="96" stroke="rgba(160,140,255,0.3)" stroke-width="0.7"/>
          <line x1="15" y1="118" x2="37" y2="118" stroke="rgba(160,140,255,0.3)" stroke-width="0.7"/>
          <line x1="23" y1="97" x2="22.5" y2="117" stroke="rgba(180,160,255,0.2)" stroke-width="0.6"/>
          <line x1="26" y1="97" x2="26" y2="117" stroke="rgba(190,170,255,0.4)" stroke-width="0.9"/>
          <line x1="29" y1="97" x2="29.5" y2="117" stroke="rgba(180,160,255,0.2)" stroke-width="0.6"/>
          <circle cx="26" cy="107" r="2" fill="rgba(210,190,255,0.75)"/>
        </g>

        <!-- barrel lower -->
        <path d="M15 118 L17 178 L35 178 L37 118 Z" fill="#0c0a1a" stroke="rgba(100,85,165,0.18)" stroke-width="0.5"/>

        <!-- focus collar -->
        <path d="M16 175 L17 190 L35 190 L36 175 Z" fill="#181535" stroke="rgba(140,120,215,0.3)" stroke-width="0.5"/>
        <line x1="16" y1="175" x2="36" y2="175" stroke="rgba(145,125,215,0.25)" stroke-width="0.7"/>
        <line x1="17" y1="190" x2="35" y2="190" stroke="rgba(145,125,215,0.25)" stroke-width="0.7"/>

        <!-- eyepiece barrel -->
        <path d="M17 190 L19 232 L33 232 L35 190 Z" fill="#090716" stroke="rgba(100,85,155,0.18)" stroke-width="0.5"/>

        <!-- eyepiece cup -->
        <path d="M18 230 L15 244 L37 244 L34 230 Z" fill="#13102a" stroke="rgba(130,110,200,0.3)" stroke-width="0.5"/>
        <ellipse cx="26" cy="232" rx="9" ry="2" fill="#181535" stroke="rgba(140,120,205,0.3)" stroke-width="0.5"/>
        <ellipse cx="26" cy="244" rx="11" ry="2.5" fill="#1c193a" stroke="rgba(150,130,215,0.35)" stroke-width="0.5"/>

        <!-- feet -->
        <line x1="26" y1="246" x2="16" y2="256" stroke="rgba(100,85,155,0.3)" stroke-width="0.8"/>
        <line x1="26" y1="246" x2="36" y2="256" stroke="rgba(100,85,155,0.3)" stroke-width="0.8"/>
        <ellipse cx="16" cy="256" rx="2.5" ry="0.8" fill="rgba(100,85,155,0.25)"/>
        <ellipse cx="36" cy="256" rx="2.5" ry="0.8" fill="rgba(100,85,155,0.25)"/>

        <!-- clickable eyepiece -->
        <ellipse cx="26" cy="244" rx="13" ry="4" fill="transparent" id="eye-btn" style="cursor:pointer"/>
      </svg>
    </div>

    <!-- timeline layer -->
    <div class="timeline-layer" style="width: 160px;">
      <div class="range-badge" id="range-badge">last 7 days</div>
      <div class="close-btn" id="close-btn">close ×</div>
      <div class="tl-line"></div>
      <div class="tl-sessions" id="tl-sessions"></div>
    </div>

  </div>
</div>

<script>
const sessions = [
  { title: "on grief and letting go", date: "today", color: "#9b72e8", daysAgo: 0 },
  { title: "what discipline means", date: "yesterday", color: "#7bb8d4", daysAgo: 1 },
  { title: "the restlessness pattern", date: "Apr 9", color: "#c47ab0", daysAgo: 3 },
  { title: "morning clarity ritual", date: "Apr 8", color: "#6db89e", daysAgo: 4 },
  { title: "building vs becoming", date: "Apr 6", color: "#9b72e8", daysAgo: 6 },
  { title: "identity under pressure", date: "Apr 4", color: "#7bb8d4", daysAgo: 8 },
  { title: "fear of finishing things", date: "Apr 1", color: "#c47ab0", daysAgo: 11 },
  { title: "the attention economy", date: "Mar 28", color: "#6db89e", daysAgo: 15 },
  { title: "solitude vs loneliness", date: "Mar 22", color: "#9b72e8", daysAgo: 21 },
  { title: "creative blocks", date: "Mar 15", color: "#7bb8d4", daysAgo: 28 },
  { title: "what rest looks like", date: "Mar 8", color: "#c47ab0", daysAgo: 35 },
  { title: "on being seen", date: "Feb 28", color: "#6db89e", daysAgo: 43 },
];

const ranges = [
  { label: "last 7 days", days: 7 },
  { label: "last 2 weeks", days: 14 },
  { label: "last month", days: 30 },
  { label: "last 3 months", days: 90 },
  { label: "all time", days: 999 },
];

let open = false;
let dialPct = 0;
let dragY = null;
let dragBase = null;

function rangeIdx() { return Math.min(Math.floor(dialPct / 20), 4); }

function render() {
  const r = ranges[rangeIdx()];
  document.getElementById('range-badge').textContent = r.label;
  const filtered = sessions.filter(s => s.daysAgo <= r.days).slice(0, 9);
  const container = document.getElementById('tl-sessions');
  container.innerHTML = filtered.map(s => `
    <div class="tl-item">
      <div class="tl-dot" style="background:${s.color}; box-shadow: 0 0 4px ${s.color}55;"></div>
      <div class="tl-label">${s.title}</div>
      <div class="tl-date">${s.date}</div>
    </div>
  `).join('');
}

function setOpen(val) {
  open = val;
  document.getElementById('instrument').classList.toggle('open', open);
  document.getElementById('tel-icon').classList.toggle('hidden', open);
  if (open) render();
}

document.getElementById('tel-icon').addEventListener('click', () => setOpen(true));
document.getElementById('close-btn').addEventListener('click', () => setOpen(false));
document.getElementById('eye-btn').addEventListener('click', () => setOpen(false));

const dialG = document.getElementById('dial-g');

dialG.addEventListener('mousedown', e => { dragY = e.clientY; dragBase = dialPct; e.preventDefault(); });
document.addEventListener('mousemove', e => {
  if (dragY === null) return;
  const delta = dragY - e.clientY;
  dialPct = Math.max(0, Math.min(95, dragBase + delta * 0.55));
  render();
});
document.addEventListener('mouseup', () => { dragY = null; });

dialG.addEventListener('touchstart', e => { dragY = e.touches[0].clientY; dragBase = dialPct; e.preventDefault(); }, { passive: false });
document.addEventListener('touchmove', e => {
  if (dragY === null) return;
  const delta = dragY - e.touches[0].clientY;
  dialPct = Math.max(0, Math.min(95, dragBase + delta * 0.55));
  render();
}, { passive: false });
document.addEventListener('touchend', () => { dragY = null; });

const scene = document.getElementById('scene');
for (let i = 0; i < 65; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const sz = Math.random() * 2 + 0.5;
  s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;opacity:${0.1+Math.random()*0.5}`;
  scene.appendChild(s);
}
</script>
